name: Build Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Build Extension
        run: |
          if [ -f "upgrade-appinventor.sh" ]; then
            chmod +x upgrade-appinventor.sh
            ./upgrade-appinventor.sh
          fi
          ant extensions

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: out/*.aix
